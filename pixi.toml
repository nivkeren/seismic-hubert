[workspace]
name = "seismic-hubert"
version = "0.1.0"
description = "Self-supervised learning for seismic data using HuBERT architecture"
channels = ["conda-forge", "pytorch"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tasks]
train = "python -m seismic_hubert.train"
explore = "jupyter lab"

[dependencies]
python = ">=3.10,<3.12"
pytorch = ">=2.0"
torchvision = "*"
torchaudio = "*"
transformers = ">=4.35"
h5py = ">=3.0"
pandas = ">=2.0"
numpy = ">=1.24"
scipy = ">=1.10"
matplotlib = ">=3.7"
seaborn = "*"
tqdm = "*"
tensorboard = "*"
jupyterlab = "*"
ipywidgets = "*"
scikit-learn = "*"
einops = "*"
wandb = "*"
obspy = "*"
setuptools = "<67"
python-dotenv = ">=1.2.2,<2"
pytorch-lightning = ">=2.6.1,<3"

[pypi-dependencies]
datasets = "*"
accelerate = "*"
