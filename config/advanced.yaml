# Seismic HuBERT Advanced Training Configuration
#
# This config enables all domain-specific features:
# - Combined clustering features (spectrogram + STA/LTA + frequency bands + polarization)
# - Linear mask scheduling with curriculum learning
# - Distance-adaptive masking
# - Mixed precision training with MLflow logging

model:
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  num_clusters: 200  # More clusters for richer targets

data:
  hdf5_path: "STEAD/merge.hdf5"
  csv_path: "STEAD/merge.csv"
  channel: "all"  # Use all 3 components for polarization features
  max_samples: null
  norm_mode: "zscore"
  highpass_freq: 1.0
  lowpass_freq: 40.0
  train_val_split: 0.95

clustering:
  # Use all available feature types for rich K-means targets
  feature_mode: "combined"
  include_stalta: true
  include_frequency_bands: true
  include_multichannel: true  # Polarization features
  feature_dim: 32
  hop_length: 32

masking:
  mask_prob: 0.08
  mask_length: 5
  
  # Curriculum learning: gradually increase mask length
  schedule: "linear"
  mask_length_start: 3   # ~1 sec at epoch 0
  mask_length_end: 12    # ~4 sec by final epoch
  
  # Adapt mask to event distance
  distance_adaptive: true
  distance_mask_min: 2   # Close events (~10 km)
  distance_mask_max: 15  # Distant events (~200 km)

training:
  batch_size: 16
  lr: 5.0e-5
  weight_decay: 0.01
  max_epochs: 100
  warmup_steps: 1000
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  
  num_workers: 4
  accelerator: "gpu"
  devices: 1
  precision: "16-mixed"  # Use mixed precision
  seed: 42

logging:
  output_dir: "outputs/advanced"
  
  mlflow: true
  mlflow_tracking_uri: "mlruns"
  mlflow_experiment: "seismic-hubert-advanced"
  
  wandb: false
  wandb_project: "seismic-hubert"

resume_from: null
