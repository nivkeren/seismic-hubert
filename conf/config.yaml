# Seismic HuBERT Training Configuration
#
# Usage:
#   python train.py                              # Use defaults
#   python train.py +experiment=overfit          # Use experiment preset
#   python train.py training.max_epochs=50       # Override any value
#   python train.py --multirun training.lr=1e-4,5e-5  # Sweep

defaults:
  - _self_

# Model architecture
model:
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  num_clusters: 100

# Data loading
data:
  hdf5_path: "../STEAD/merge.hdf5"
  csv_path: "../STEAD/merge.csv"
  channel: "Z"  # "Z" or "all"
  max_samples: null
  norm_mode: "zscore"
  highpass_freq: 1.0
  lowpass_freq: 40.0
  train_val_split: 0.95

# K-means clustering for targets
clustering:
  feature_mode: "spectrogram"  # spectrogram, stalta, frequency_bands, multi_channel, combined
  include_stalta: false
  include_frequency_bands: false
  include_multichannel: false
  feature_dim: 32
  hop_length: 32

# Masking strategy
masking:
  mask_prob: 0.08
  mask_length: 5
  schedule: "constant"  # constant, linear, step, cosine
  mask_length_start: 3
  mask_length_end: 12
  distance_adaptive: false
  distance_mask_min: 2
  distance_mask_max: 15

# Training hyperparameters
training:
  batch_size: 16
  lr: 5.0e-5
  weight_decay: 0.01
  max_epochs: 100
  warmup_steps: 1000
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  num_workers: 4
  accelerator: "auto"
  devices: 1
  precision: "32"
  seed: 42

# Logging
logging:
  run_name: null
  logger: "mlflow"  # tensorboard, mlflow, wandb
  mlflow_experiment: "seismic-hubert"
  mlflow_tracking_uri: "mlruns"
  wandb_project: "seismic-hubert"

# Hydra output directory
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false

# Resume from checkpoint
resume_from: null
